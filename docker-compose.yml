# ══════════════════════════════════════════
# WAZZAL — Docker Compose Configuration
# ══════════════════════════════════════════

version: "3.8"

services:
  # ─── PostgreSQL Database ───
  database:
    image: postgres:16-alpine
    container_name: wazzal-database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wazzal_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wazzal_password}
      POSTGRES_DB: ${POSTGRES_DB:-wazzal_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wazzal_user} -d ${POSTGRES_DB:-wazzal_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ───
  backend:
    build:
      context: ./backend
      target: development
    container_name: wazzal-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wazzal_user}:${POSTGRES_PASSWORD:-wazzal_password}@database:5432/${POSTGRES_DB:-wazzal_db}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-key-change-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-your-openai-api-key}
      BACKEND_PORT: 4000
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    depends_on:
      database:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate dev --name init 2>/dev/null || true && npx prisma generate && npm run dev"

  # ─── Frontend ───
  frontend:
    build:
      context: ./frontend
      target: development
    container_name: wazzal-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
