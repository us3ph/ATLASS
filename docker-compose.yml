# ══════════════════════════════════════════
# WAZZAL — Docker Compose Configuration
# ══════════════════════════════════════════

# ─── Docker Secrets (file-based) ───
secrets:
  openrouter_api_key:
    file: ./secrets/openrouter_api_key
  jwt_secret:
    file: ./secrets/jwt_secret
  db_password:
    file: ./secrets/db_password

services:
  # ─── PostgreSQL Database ───
  database:
    image: postgres:16-alpine
    container_name: wazzal-database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wazzal_user}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: ${POSTGRES_DB:-wazzal_db}
    secrets:
      - db_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wazzal_user} -d ${POSTGRES_DB:-wazzal_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ───
  backend:
    build:
      context: ./backend
      target: development
    container_name: wazzal-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wazzal_user}:${POSTGRES_PASSWORD:-wazzal_password}@database:5432/${POSTGRES_DB:-wazzal_db}
      BACKEND_PORT: 4000
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:5173
      AI_BASE_URL: ${AI_BASE_URL:-https://openrouter.ai/api/v1}
      AI_MODEL: ${AI_MODEL:-meta-llama/llama-3.1-8b-instruct:free}
    secrets:
      - openrouter_api_key
      - jwt_secret
      - db_password
    ports:
      - "4000:4000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    depends_on:
      database:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate dev --name init 2>/dev/null || true && npx prisma generate && npm run dev"

  # ─── Frontend ───
  frontend:
    build:
      context: ./frontend
      target: development
    container_name: wazzal-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
